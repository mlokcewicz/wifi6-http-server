# CONFIG_PM_PARTITION_SIZE_MCUBOOT is overwritten by pm_static.yml
# CONFIG_PM_PARTITION_SIZE_MCUBOOT=84D0 

# For nRF7002-DK
CONFIG_SPI=n
CONFIG_SPI_NOR=n

CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_MCUBOOT_LOG_LEVEL_DBG=y
CONFIG_LOG_MODE_IMMEDIATE=y

# For DFU in MCUboot
# CONFIG_MCUBOOT_SERIAL=y
# CONFIG_BOOT_SERIAL_UART=y
# # 3.2 Since we now use UART for Serial Recovery, we must disable UART 
# # from the console from MCUboot, so this does not try to use the UART at the same time.
# CONFIG_UART_CONSOLE=n

CONFIG_MCUBOOT_INDICATION_LED=y

