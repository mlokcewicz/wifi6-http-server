# CONFIG_PM_PARTITION_SIZE_MCUBOOT is overwritten by pm_static.yml
# CONFIG_PM_PARTITION_SIZE_MCUBOOT=84D0 

CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_MCUBOOT_LOG_LEVEL_DBG=n
CONFIG_LOG_MODE_IMMEDIATE=y

# For DFU in MCUboot
# CONFIG_MCUBOOT_SERIAL=y
# CONFIG_BOOT_SERIAL_UART=y
# # 3.2 Since we now use UART for Serial Recovery, we must disable UART 
# # from the console from MCUboot, so this does not try to use the UART at the same time.
# CONFIG_UART_CONSOLE=n

CONFIG_MCUBOOT_INDICATION_LED=y

CONFIG_GPIO=y
CONFIG_SPI=y
CONFIG_SPI_NOR=y
CONFIG_SPI_NOR_SFDP_DEVICETREE=y
CONFIG_SPI_NOR_FLASH_LAYOUT_PAGE_SIZE=4096
# QSPI drivers are enabled by defualt for some chips.
# Disable it explicitly to be sure QSPI is disabled.
CONFIG_NORDIC_QSPI_NOR=n 

# required by SPI driver
CONFIG_MULTITHREADING=y

CONFIG_BOOT_MAX_IMG_SECTORS=512
CONFIG_PM_PARTITION_SIZE_MCUBOOT=0x10000

